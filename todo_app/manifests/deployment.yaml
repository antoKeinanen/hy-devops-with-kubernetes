apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      volumes:
        - name: todo-app-vol
          persistentVolumeClaim:
            claimName: todo-app-pvc
      containers:
        - name: todo-app
          image: todo-app:latest
          imagePullPolicy: Never
          env:
          - name: PORT
            value: "5000"
          volumeMounts:
            - name: todo-app-vol
              mountPath: /usr/src/app/files
